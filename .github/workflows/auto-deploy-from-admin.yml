name: 后台发布自动部署

on:
  repository_dispatch:
    types:
      - rebuild-search-index

concurrency:
  group: auto-deploy-from-admin
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.client_payload.source == 'admin-posts' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 安装依赖
        run: npm ci

      - name: 刷新 Cloudflare Access Token
        id: cf_token
        env:
          CLOUDFLARE_REFRESH_TOKEN: ${{ secrets.CLOUDFLARE_REFRESH_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_REFRESH_TOKEN" ]; then
            echo "缺少 GitHub Secret: CLOUDFLARE_REFRESH_TOKEN"
            exit 1
          fi

          RESPONSE=$(curl -sS -X POST "https://dash.cloudflare.com/oauth2/token" \
            --data-urlencode "grant_type=refresh_token" \
            --data-urlencode "refresh_token=${CLOUDFLARE_REFRESH_TOKEN}" \
            --data-urlencode "client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7")

          ACCESS_TOKEN=$(node -e 'const data = JSON.parse(process.argv[1]); if (!data.access_token) { console.error(JSON.stringify(data)); process.exit(1); } process.stdout.write(data.access_token);' "$RESPONSE")
          echo "::add-mask::$ACCESS_TOKEN"
          echo "token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: 执行部署
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.cf_token.outputs.token }}
        run: npm run deploy
